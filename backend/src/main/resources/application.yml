spring:
  datasource:
    url: jdbc:h2:mem:formbuilderdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      # Disabled by default. Enabled only via the 'dev' profile below.
      enabled: false
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null

server:
  port: 8080

logging:
  level:
    com.formbuilder: INFO
    org.springframework.web: INFO

app:
  cors:
    allowed-origins: "http://localhost:3000"
  rate-limit:
    submissions:
      max-requests: 20
      window-seconds: 60

---
spring:
  config:
    activate:
      on-profile: dev
  h2:
    console:
      enabled: true
      path: /h2-console

app:
  cors:
    allowed-origins: "http://localhost:3000,http://localhost:3001"

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:formbuilder}
    username: ${DB_USERNAME:formbuilder}
    password: ${DB_PASSWORD:formbuilder}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  h2:
    console:
      enabled: false

app:
  cors:
    allowed-origins: "${APP_CORS_ALLOWED_ORIGINS:https://example.com}"
