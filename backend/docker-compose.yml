version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: formbuilder-db
    environment:
      POSTGRES_DB: formbuilder
      POSTGRES_USER: formbuilder
      POSTGRES_PASSWORD: formbuilder
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U formbuilder -d formbuilder"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
